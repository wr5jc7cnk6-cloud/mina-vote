<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>みんなで投票</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .vote-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .vote-btn:active { transform: scale(0.95); }
    .rank-card { transition: all 0.4s ease; }
    .rank-area { width: 72px; flex-shrink: 0; text-align: center; }
    .vote-area { width: 68px; flex-shrink: 0; text-align: right; }
  </style>
</head>
<body class="bg-gradient-to-br from-purple-100 to-pink-100 min-h-screen pb-20">
  <div class="max-w-md mx-auto pt-8 px-4">
    <div class="flex items-center gap-3 justify-center mb-2">
      <div class="text-4xl">🗳️</div>
      <h1 class="text-3xl font-bold">みんなで投票</h1>
    </div>
    <p id="question" class="text-xl text-center font-medium mb-8"></p>

    <div id="options" class="space-y-3"></div>

    <div class="mt-10">
      <h2 class="text-lg font-bold text-purple-700 mb-4 flex items-center gap-2">
        🏆 現在のランキング
      </h2>
      <div id="ranking" class="space-y-3"></div>
    </div>

    <div class="mt-8 text-center text-sm text-purple-600">
      総投票数: <span id="total" class="font-bold text-2xl">0</span>票
    </div>
  </div>

  <!-- 下部固定エリア -->
  <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 max-w-md mx-auto">
    <div class="px-4 py-3 text-center">
      <p class="text-sm text-gray-600 mb-2">この投票のお問い合わせ番号</p>
      <p class="font-mono text-lg font-bold text-purple-600 bg-purple-50 py-1 px-4 inline-block rounded-xl">
        254PDCLI
      </p>
    </div>
    
    <a href="https://line.me/R/ti/p/@254pdcli" 
       target="_blank"
       class="flex items-center justify-center gap-2 mx-4 mb-4 bg-[#00B900] text-white font-bold text-lg py-4 rounded-2xl shadow-lg active:scale-95 transition-all">
      <span class="text-2xl">💬</span>
      公式LINEで質問・新しい投票依頼
    </a>
  </div>

  <script>
    const SUPABASE_URL = 'https://yikpghoulgvkhvgxqvap.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_DnD2CZFvuoCClSkDRVYwiQ_wi1oDTed';

    const POLL_ID = 'dinner-2026';
    let currentVotes = [0, 0, 0, 0, 0, 0];
    const optionsList = [
      "カレー", 
      "ラーメン", 
      "寿司", 
      "ピザ", 
      "からあげクン", 
      "なんか適当"
    ];

    async function loadPoll() {
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/polls?id=eq.${POLL_ID}`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        });
        const data = await res.json();
        
        if (data && data[0]) {
          currentVotes = data[0].votes || [0,0,0,0,0,0];
          document.getElementById('question').textContent = data[0].question;
        } else {
          await createInitialPoll();
        }
      } catch(e) {
        console.error("ロードエラー", e);
      }
      render();
    }

    async function createInitialPoll() {
      await fetch(`${SUPABASE_URL}/rest/v1/polls`, {
        method: 'POST',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          id: POLL_ID,
          question: "今日の夕飯何食べたい？",
          options: optionsList,
          votes: [0,0,0,0,0,0]
        })
      });
    }

    async function vote(index) {
      currentVotes[index]++;
      await fetch(`${SUPABASE_URL}/rest/v1/polls?id=eq.${POLL_ID}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Content-Type': 'application/json',
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ votes: currentVotes })
      });
      render();
    }

    function render() {
      const container = document.getElementById('options');
      container.innerHTML = '';
      const total = currentVotes.reduce((a, b) => a + b, 0);

      optionsList.forEach((option, i) => {
        const percent = total === 0 ? 0 : Math.round((currentVotes[i] / total) * 100);
        const btn = document.createElement('button');
        btn.className = `vote-btn w-full bg-white border-2 border-purple-200 hover:border-purple-400 rounded-3xl p-5 text-left relative overflow-hidden shadow-sm`;
        btn.innerHTML = `
          <div class="flex justify-between items-center mb-3">
            <span class="text-lg font-medium">${option}</span>
            <span class="text-3xl font-bold text-purple-600">${currentVotes[i]}</span>
          </div>
          <div class="h-3 bg-purple-100 rounded-full overflow-hidden">
            <div class="h-full bg-gradient-to-r from-purple-500 to-pink-500 transition-all duration-700" style="width: ${percent}%"></div>
          </div>
        `;
        btn.onclick = () => vote(i);
        container.appendChild(btn);
      });

      renderRanking(total);
      document.getElementById('total').textContent = total;
    }

    function renderRanking(total) {
      const container = document.getElementById('ranking');
      container.innerHTML = '';

      const ranked = optionsList.map((option, i) => ({
        name: option,
        votes: currentVotes[i]
      })).sort((a, b) => b.votes - a.votes);

      ranked.forEach((item, rank) => {
        let rankDisplay = '';
        if (rank === 0) rankDisplay = '🥇';
        else if (rank === 1) rankDisplay = '🥈';
        else if (rank === 2) rankDisplay = '🥉';
        else rankDisplay = `<span class="text-3xl font-bold text-purple-600">${rank + 1}</span><span class="text-base text-purple-500 ml-0.5">位</span>`;

        const div = document.createElement('div');
        div.className = `rank-card flex items-center gap-4 bg-white rounded-2xl p-5 border ${rank < 3 ? 'border-yellow-400 shadow-md' : 'border-gray-200'}`;
        div.innerHTML = `
          <div class="rank-area text-5xl">${rankDisplay}</div>
          <div class="flex-1 text-lg font-medium">${item.name}</div>
          <div class="vote-area">
            <div class="text-4xl font-bold text-purple-600 leading-none">${item.votes}</div>
            <div class="text-xs text-gray-500 mt-0.5">票</div>
          </div>
        `;
        container.appendChild(div);
      });
    }

    loadPoll();
    setInterval(loadPoll, 1500);
  </script>
</body>
</html>
